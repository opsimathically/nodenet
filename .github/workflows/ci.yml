name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Node 26 / ${{ matrix.arch }} glibc
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-24.04
          - arch: AArch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9f06a71cc4710d4507903 # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Install dependencies
        run: npm ci

      - name: Run unprivileged quality gates
        run: npm run ci
