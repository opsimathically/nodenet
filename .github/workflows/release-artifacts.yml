name: Release artifact rehearsal

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.target }} package
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-gnu
            runner: ubuntu-24.04
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9f06a71cc4710d4507903 # v6.4.0
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run ci
      - name: Run raw socket privileged matrix
        run: >-
          sudo env NODENETRAW_NODE="$(command -v node)" PATH="$(dirname
          "$(command -v
          node)"):/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          npm run test:privileged
      - name: Run raw event and traceroute stress
        run: >-
          sudo env NODENETRAW_NODE="$(command -v node)" PATH="$(dirname
          "$(command -v
          node)"):/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          sh -c 'npm run test:phase11:stress && npm run test:phase15:stress'
      - run: npm run build:native:release && npm run build:typescript
        env:
          CARGO_INCREMENTAL: "0"
          SOURCE_DATE_EPOCH: "1783843200"
      - run: npm run release:verify-artifact
      - run: npm run release:reproducibility
      - run: npm run release:consumer-test
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: nodenetraw-${{ matrix.target }}
          path: |
            packages/nodenetraw/release/tarballs/*.tgz
            packages/nodenetraw/release/provenance-*.json
          if-no-files-found: error
          retention-days: 14

  scanner-package:
    name: scanner ${{ matrix.target }} package
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-gnu
            runner: ubuntu-24.04
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9f06a71cc4710d4507903 # v6.4.0
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run ci
      - name: Run scanner fault and namespace matrix
        run: >-
          sudo env NODENETSCANNER_NODE="$(command -v node)" PATH="$(dirname
          "$(command -v
          node)"):/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          npm run test:phase24:namespace
      - run:
          npm run scanner:build:native:release && npm run build:typescript
          --workspace=@opsimathically/nodenetscanner
        env:
          CARGO_INCREMENTAL: "0"
          SOURCE_DATE_EPOCH: "1783843200"
      - run: npm run scanner:release:verify-artifact
      - run: npm run scanner:release:reproducibility
      - run: npm run scanner:release:consumer-test
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: nodenetscanner-${{ matrix.target }}
          path: |
            packages/nodenetscanner/release/tarballs/*.tgz
            packages/nodenetscanner/release/provenance-*.json
          if-no-files-found: error
          retention-days: 14
